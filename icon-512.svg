<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#06101f"/>
  <!-- Decorative rings -->
  <circle cx="256" cy="276" r="44"  fill="none" stroke="#38bdf8" stroke-width="2"  opacity="0.25"/>
  <circle cx="256" cy="276" r="72"  fill="none" stroke="#38bdf8" stroke-width="2"  opacity="0.3"/>
  <circle cx="256" cy="276" r="100" fill="none" stroke="#38bdf8" stroke-width="2"  opacity="0.35"/>
  <circle cx="256" cy="276" r="130" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="276" r="162" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.18"/>
  <!-- Outer wall -->
  <circle cx="256" cy="276" r="192" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.2"/>
  <!-- Brick arcs — innermost ring sample -->
  <g opacity="0.7">
    <path d="M256,276 m0,-44 a44,44 0 0,1 38.1,-22" fill="none" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round"/>
    <path d="M256,276 m38.1,-22 a44,44 0 0,1 5.9,44" fill="none" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Brick arcs — mid ring -->
  <g opacity="0.65">
    <path d="M 256 204 A 72 72 0 0 1 318 214" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round"/>
    <path d="M 318 214 A 72 72 0 0 1 328 276" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
    <path d="M 184 276 A 72 72 0 0 1 194 214" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Paddle arc at bottom of outer wall -->
  <path d="M 196 426 A 192 192 0 0 1 316 426"
        fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <!-- Ball -->
  <radialGradient id="bg" cx="45%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#38bdf8"/>
  </radialGradient>
  <circle cx="256" cy="178" r="13" fill="url(#bg)"/>
  <!-- Glow behind ball -->
  <circle cx="256" cy="178" r="20" fill="#38bdf8" opacity="0.18"/>
  <!-- Wordmark -->
  <text x="256" y="112" text-anchor="middle" font-family="Courier New, monospace"
        font-weight="900" font-size="72" letter-spacing="8" fill="#ffffff">VORTEX</text>
  <text x="256" y="132" text-anchor="middle" font-family="Courier New, monospace"
        font-size="14" letter-spacing="6" fill="#38bdf8" opacity="0.6">REMASTERED</text>
</svg>
